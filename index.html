<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barcode Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .number-input {
            width: 100%;
            font-size: 48px;
            padding: 20px;
            text-align: center;
            border: 3px solid #667eea;
            border-radius: 15px;
            font-weight: bold;
            color: #333;
            outline: none;
            transition: all 0.3s;
        }

        .number-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            font-size: 36px;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-minus {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-plus {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .qrcode-section {
            margin-top: 30px;
            text-align: center;
        }

        .qrcode-label {
            font-size: 24px;
            color: #666;
            margin-bottom: 15px;
            font-weight: 600;
        }

        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        #qrcode canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        #qrcode svg {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .number-input {
                font-size: 40px;
                padding: 15px;
            }

            .btn {
                font-size: 32px;
                padding: 18px;
            }

            .qrcode-label {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Barcode Generator</h1>

        <div class="input-section">
            <input type="number" id="numberInput" class="number-input" value="0" placeholder="Enter number">
            <div class="button-group">
                <button class="btn btn-plus" onclick="increaseNumber()">➕ Plus</button>
            </div>
        </div>

        <div class="qrcode-section">
            <div class="qrcode-label">Scan Barcode</div>
            <div id="qrcode"><svg id="barcode"></svg></div>
        </div>
    </div>

    <script>
        let currentNumber = 0;
        const input = document.getElementById('numberInput');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Play Bengali "Get Rich" voice
        function playBengaliVoice() {
            const utterance = new SpeechSynthesisUtterance('ধনী হও');
            utterance.lang = 'bn-BD'; // Bengali (Bangladesh)
            utterance.rate = 1.0;
            utterance.pitch = 1.2;
            speechSynthesis.speak(utterance);
        }

        // Play sound (fallback)
        function playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // Generate barcode
        function generateBarcode(text) {
            try {
                JsBarcode("#barcode", text.toString(), {
                    format: "CODE128",
                    width: 3,
                    height: 120,
                    displayValue: true,
                    fontSize: 24,
                    margin: 10
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Increase
        function increaseNumber() {
            currentNumber = parseInt(input.value) || 0;
            currentNumber++;
            input.value = currentNumber;
            generateBarcode(currentNumber);
            playBengaliVoice();
        }

        // Decrease
        function decreaseNumber() {
            currentNumber = parseInt(input.value) || 0;
            currentNumber--;
            input.value = currentNumber;
            generateBarcode(currentNumber);
            playSound(400);
        }

        // Listen to input changes
        input.addEventListener('input', function() {
            const value = input.value;
            if (value !== '') {
                generateBarcode(value);
            }
        });

        // Initialize barcode
        generateBarcode(input.value);
    </script>
</body>
</html>
